services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-directus}
      POSTGRES_USER: ${POSTGRES_USER:-directus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-directus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:latest
    restart: unless-stopped
    ports:
      - "${DIRECTUS_PORT:-8055}:8055"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    environment:
      SECRET: ${DIRECTUS_SECRET:-change-me-in-production}
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-directus}
      DB_USER: ${POSTGRES_USER:-directus}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@portfolio.local}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-admin123}
      CORS_ENABLED: "true"
      CORS_ORIGIN: ${ASTRO_DEV_URL:-http://localhost:4321}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}

volumes:
  db_data:
  directus_uploads:
  directus_extensions:
